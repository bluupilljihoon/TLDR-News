name: TLDR Daily Discord Bot

on:
  schedule:
    # 매일 오전 9시 (한국 시간, KST = UTC+9 → UTC 00:00)
    - cron: "0 0 * * 1-5"   # 평일만
    # 주말 포함 매일 받고 싶으면 아래 줄로 교체:
    # - cron: "0 0 * * *"
  workflow_dispatch:          # 수동 실행 버튼 (테스트용)

jobs:
  send-tldr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch TLDR and send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python fetch_tldr.py
